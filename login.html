<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Hệ thống Quản lý</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        /* ✨ CSS trang trí Modal Google Login chuẩn tone Aqua Pastel Tối giản ✨ */
        .login-box {
            display: flex; flex-direction: column; align-items: center;
            padding: 45px 35px; /* Tăng không gian thở cho form */
            border-radius: 20px; /* Bo góc mềm mại kẹo ngọt */
            box-shadow: 0 15px 35px rgba(2, 62, 138, 0.08); /* Đổ bóng nhẹ nhàng */
            width: 340px; /* Cố định chiều rộng vừa vặn */
            background: #ffffff;
            box-sizing: border-box;
        }
        .login-box h3 {
            margin-top: 0; margin-bottom: 15px; 
            color: var(--primary-color); font-size: 22px; font-weight: 800; letter-spacing: 1px;
        }
        .login-subtitle {
            color: #64748b; font-size: 14px; margin-bottom: 35px; 
            text-align: center; line-height: 1.6; font-weight: 500;
        }
        
        /* Chứa nút Google (Đã gỡ bỏ viền đứt nét theo yêu cầu) */
        .google-btn-container {
            display: flex; justify-content: center; width: 100%; margin-bottom: 15px;
        }

        /* Nút Hủy nhẹ nhàng, thanh thoát */
        .btn-reset-pastel { 
            width: 100%; margin-top: 10px; 
            background: #f1f5f9; color: #64748b; border: none; 
            padding: 12px 20px; border-radius: 12px; font-weight: 700; 
            cursor: pointer; font-size: 13px; transition: all 0.3s ease; 
        }
        .btn-reset-pastel:hover { background: #e2e8f0; color: #475569; transform: translateY(-1px); }
        
        /* Trạng thái Loading cho Google Login */
        #googleLoginStatus {
            color: var(--text-main); font-size: 13px; font-weight: 600; text-align: center; 
            display: none; margin-top: 15px; padding: 12px; border-radius: 12px;
            background: #f0f7ff; border: 1px solid #cce3ff; width: 100%; box-sizing: border-box;
        }
        #googleLoginStatus.error { color: #d93025; background: #fdf2f2; border-color: #fbd6d6; }
    </style>
</head>
<body>
    <div class="modal-overlay" style="display: flex; background: rgba(2, 62, 138, 0.3); backdrop-filter: blur(4px);">
        <div class="login-box">
            <h3>ĐĂNG NHẬP</h3>
            <p class="login-subtitle">Vui lòng sử dụng tài khoản Google đã được cấp quyền để truy cập hệ thống.</p>

            <div class="google-btn-container">
                <div id="g_id_onload"
                     data-client_id="580359285280-slv8aodii2mjp8dpqas9kui5nud3m0kd.apps.googleusercontent.com"
                     data-callback="handleCredentialResponse"
                     data-auto_prompt="false">
                </div>
                <div class="g_id_signin"
                     data-type="standard"
                     data-size="large"
                     data-theme="outline"
                     data-text="sign_in_with"
                     data-shape="rectangular"
                     data-logo_alignment="center"
                     data-width="260">
                </div>
            </div>

            <div id="googleLoginStatus"></div>
            
            <button class="btn-reset-pastel" onclick="closeLogin()">HỦY & QUAY LẠI</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="script.js"></script>

    <script>
        function decodeJwtResponse(token) {
            let base64Url = token.split('.')[1];
            let base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            let jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        }

        async function handleCredentialResponse(response) {
            const payload = decodeJwtResponse(response.credential);
            const statusBox = document.getElementById('googleLoginStatus');
            const googleBtn = document.querySelector('.g_id_signin');
            
            // Hiển thị trạng thái đang tải, ẩn nút Google tạm thời
            statusBox.className = ''; 
            statusBox.innerHTML = `<div class="spinner-mini" style="border-top-color: var(--primary-color);"></div> Đang xác thực tài khoản...`;
            statusBox.style.display = "block";
            googleBtn.style.opacity = "0.5";
            googleBtn.style.pointerEvents = "none";

            try {
                // WEB_APP_URL lấy từ biến toàn cục trong script.js
                const res = await fetch(WEB_APP_URL, {
                    method: "POST",
                    body: JSON.stringify({
                        action: "google_login",
                        email: payload.email,
                        name: payload.name,
                        avatar: payload.picture
                    })
                });
                const r = await res.json();

                if (r.success) {
                    statusBox.innerHTML = `<i class="fa-solid fa-circle-check" style="color: #4caf50;"></i> Xác thực thành công!`;
                    localStorage.setItem("userSession", JSON.stringify(r.data));
                    showToast("Đăng nhập Google thành công!", "success");
                    setTimeout(() => window.location.href = 'index.html', 800);
                } else {
                    statusBox.className = 'error';
                    statusBox.innerHTML = `<i class="fa-solid fa-circle-exclamation"></i> ${r.message || "Tài khoản chưa được cấp quyền!"}`;
                    resetGoogleButton(googleBtn);
                }
            } catch (e) {
                statusBox.className = 'error';
                statusBox.innerHTML = `<i class="fa-solid fa-circle-exclamation"></i> Lỗi kết nối máy chủ! Vui lòng thử lại.`;
                resetGoogleButton(googleBtn);
            }
        }
        
        function resetGoogleButton(btn) {
            btn.style.opacity = "1";
            btn.style.pointerEvents = "auto";
        }
    </script>
</body>
</html>
