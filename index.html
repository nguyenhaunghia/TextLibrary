<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Quản lý Hồ sơ</title>

    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loadingScreen" class="loader">
        <div class="spinner"></div>
        <p style="margin-top: 15px; font-weight: 600; color: var(--text-main); letter-spacing: 0.5px;">
            Đang tải dữ liệu... <span id="loadPercent" style="color: var(--primary-color); font-weight: 800; margin-left: 5px;">0%</span>
        </p>
    </div>

    <div class="main-wrapper">
        <table class="table-l1">
            <thead id="headerL1"></thead>
            <tbody id="bodyL1"></tbody>
        </table>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/toastify-js" defer></script>
    <script src="script.js" defer></script>
</body>
</html>
